<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Elevate Certificate Generator</title>
    <style>
        body {
            margin: 0;
            padding: 20px;
            background: #ececec;
            font-family: 'Segoe UI', Arial, sans-serif;
            text-align: center;
        }
        .box {
            max-width: 450px;
            margin: auto;
            background: white;
            padding: 25px;
            border-radius: 20px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.1);
        }
        h1 {
            color: #00756f;
            margin-bottom: 20px;
            font-size: 24px;
        }
        input, select {
            width: 100%;
            padding: 12px;
            margin-bottom: 15px;
            border-radius: 8px;
            border: 1px solid #ccc;
            font-size: 15px;
            box-sizing: border-box;
        }
        button {
            width: 100%;
            padding: 15px;
            border: none;
            border-radius: 10px;
            background: #00756f;
            color: white;
            font-size: 17px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }
        button:hover {
            background: #005e59;
        }
        canvas {
            margin-top: 30px;
            max-width: 100%;
            border-radius: 10px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.2);
            background: white;
        }
        #download {
            display: none;
            margin-top: 20px;
            padding: 14px 25px;
            background: #00756f;
            color: white;
            text-decoration: none;
            border-radius: 10px;
            font-weight: bold;
        }
    </style>
</head>
<body>

<div class="box">
    <h1>Elevate Generator</h1>
    <input type="file" id="photo" accept="image/*">
    <input type="text" id="name" placeholder="Enter Student Name">
    <input type="text" id="percentage" placeholder="Enter Percentage (e.g. 95%)">
    
    <select id="exam">
        <option value="Higher Secondary">Higher Secondary</option>
        <option value="Higher School">Higher School</option>
    </select>

    <button onclick="generate()">Generate Certificate</button>
</div>

<canvas id="canvas" width="1080" height="1350"></canvas>
<br>
<a id="download">Download Certificate</a>

<script>
function generate() {
    const file = document.getElementById("photo").files[0];
    const name = document.getElementById("name").value;
    const percentage = document.getElementById("percentage").value;
    const exam = document.getElementById("exam").value;

    if (!file || !name || !percentage) {
        alert("Please complete all fields.");
        return;
    }

    const canvas = document.getElementById("canvas");
    const ctx = canvas.getContext("2d");

    const frame = new Image();
    // Logic: bg1 for Secondary, bg2 for School
    frame.src = (exam === "Higher Secondary") ? "bg1.png" : "bg2.png";

    frame.onload = function() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        ctx.drawImage(frame, 0, 0, 1080, 1350);

        const userImg = new Image();
        userImg.onload = function() {
            // PHOTO POSITIONING
            const photoX = 394; 
            const photoY = 460; 
            const photoW = 292;
            const photoH = 340;
            const radius = 30;

            // ASPECT RATIO CALCULATION
            let imgW = userImg.width;
            let imgH = userImg.height;
            let aspect = imgW / imgH;
            let targetAspect = photoW / photoH;
            
            let sx, sy, sw, sh;
            if (aspect > targetAspect) {
                sw = imgH * targetAspect;
                sh = imgH;
                sx = (imgW - sw) / 2;
                sy = 0;
            } else {
                sw = imgW;
                sh = imgW / targetAspect;
                sx = 0;
                sy = (imgH - sh) / 2;
            }

            // DRAW ROUNDED PHOTO
            ctx.save();
            roundedRect(ctx, photoX, photoY, photoW, photoH, radius);
            ctx.clip();
            ctx.drawImage(userImg, sx, sy, sw, sh, photoX, photoY, photoW, photoH);
            ctx.restore();

            // NAME - Positioned higher (880 instead of 930)
            ctx.fillStyle = "#0a6e69";
            ctx.font = "bold 45px Arial";
            ctx.textAlign = "center";
            ctx.fillText(name.toUpperCase(), 540, 880);

            // PERCENTAGE - Positioned higher (935 instead of 985)
            ctx.fillStyle = "#333333";
            ctx.font = "bold 40px Arial";
            ctx.fillText(percentage, 540, 935);

            // PREPARE DOWNLOAD
            const link = document.getElementById("download");
            link.href = canvas.toDataURL("image/png");
            link.download = name.replace(/\s+/g, '_') + "_Certificate.png";
            link.style.display = "inline-block";
            
            canvas.scrollIntoView({ behavior: 'smooth' });
        };
        userImg.src = URL.createObjectURL(file);
    };
}

function roundedRect(ctx, x, y, width, height, radius) {
    ctx.beginPath();
    ctx.moveTo(x + radius, y);
    ctx.lineTo(x + width - radius, y);
    ctx.quadraticCurveTo(x + width, y, x + width, y + radius);
    ctx.lineTo(x + width, y + height - radius);
    ctx.quadraticCurveTo(x + width, y + height, x + width - radius, y + height);
    ctx.lineTo(x + radius, y + height);
    ctx.quadraticCurveTo(x, y + height, x, y + height - radius);
    ctx.lineTo(x, y + radius);
    ctx.quadraticCurveTo(x, y, x + radius, y);
    ctx.closePath();
}
</script>

</body>
</html>
