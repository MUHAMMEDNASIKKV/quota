<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Elevate Certificate Generator (620x874)</title>
    <style>
        body {
            margin: 0;
            padding: 20px;
            background: #ececec;
            font-family: 'Segoe UI', Arial, sans-serif;
            text-align: center;
        }
        .box {
            max-width: 400px;
            margin: auto;
            background: white;
            padding: 25px;
            border-radius: 20px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.1);
        }
        h1 {
            color: #00756f;
            margin-bottom: 20px;
            font-size: 22px;
        }
        input, select {
            width: 100%;
            padding: 12px;
            margin-bottom: 15px;
            border-radius: 8px;
            border: 1px solid #ccc;
            font-size: 14px;
            box-sizing: border-box;
        }
        button {
            width: 100%;
            padding: 15px;
            border: none;
            border-radius: 10px;
            background: #00756f;
            color: white;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
        }
        canvas {
            margin-top: 30px;
            max-width: 100%;
            border: 1px solid #ddd;
            background: white;
            border-radius: 8px;
        }
        #download {
            display: none;
            margin-top: 20px;
            padding: 12px 25px;
            background: #00756f;
            color: white;
            text-decoration: none;
            border-radius: 8px;
            font-weight: bold;
        }
    </style>
</head>
<body>

<div class="box">
    <h1>Elevate Generator</h1>
    <input type="file" id="photo" accept="image/*">
    <input type="text" id="name" placeholder="Enter Student Name">
    <input type="text" id="percentage" placeholder="Enter Percentage (e.g. 95%)">
    
    <select id="exam">
        <option value="Higher Secondary">Higher Secondary</option>
        <option value="Higher School">Higher School</option>
    </select>

    <button onclick="generate()">Generate & Download</button>
</div>

<canvas id="canvas" width="620" height="874"></canvas>
<br>
<a id="download">Download Image</a>

<script>
function generate() {
    const fileInput = document.getElementById("photo");
    const name = document.getElementById("name").value;
    const percentage = document.getElementById("percentage").value;
    const exam = document.getElementById("exam").value;

    if (!fileInput.files[0] || !name || !percentage) {
        alert("Please fill in all details and upload a photo.");
        return;
    }

    const canvas = document.getElementById("canvas");
    const ctx = canvas.getContext("2d");

    const frame = new Image();
    frame.src = (exam === "Higher Secondary") ? "bg1.png" : "bg2.png";

    frame.onload = function() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        ctx.drawImage(frame, 0, 0, 620, 874);

        const userImg = new Image();
        userImg.onload = function() {
            // PHOTO POSITION: Moved slightly up (Y = 295)
            const photoW = 168;
            const photoH = 195;
            const photoX = (620 - photoW) / 2; 
            const photoY = 305; 
            const radius = 20;

            // Maintain Ratio logic
            let imgW = userImg.width;
            let imgH = userImg.height;
            let aspect = imgW / imgH;
            let targetAspect = photoW / photoH;
            
            let sx, sy, sw, sh;
            if (aspect > targetAspect) {
                sw = imgH * targetAspect;
                sh = imgH;
                sx = (imgW - sw) / 2;
                sy = 0;
            } else {
                sw = imgW;
                sh = imgW / targetAspect;
                sx = 0;
                sy = (imgH - sh) / 2;
            }

            ctx.save();
            roundedRect(ctx, photoX, photoY, photoW, photoH, radius);
            ctx.clip();
            ctx.drawImage(userImg, sx, sy, sw, sh, photoX, photoY, photoW, photoH);
            ctx.restore();

            // NAME: Positioned centered above text area
            ctx.fillStyle = "#0a6e69";
            ctx.font = "bold 28px Arial";
            ctx.textAlign = "center";
            ctx.fillText(name.toUpperCase(), 310, 555);

            // PERCENTAGE: Positioned centered below name
            ctx.fillStyle = "#333333";
            ctx.font = "bold 24px Arial";
            ctx.fillText(percentage, 310, 590);

            const link = document.getElementById("download");
            link.href = canvas.toDataURL("image/png");
            link.download = name.replace(/\s+/g, '_') + "_Elevate.png";
            link.style.display = "inline-block";
        };
        userImg.src = URL.createObjectURL(fileInput.files[0]);
    };
}

function roundedRect(ctx, x, y, width, height, radius) {
    ctx.beginPath();
    ctx.moveTo(x + radius, y);
    ctx.lineTo(x + width - radius, y);
    ctx.quadraticCurveTo(x + width, y, x + width, y + radius);
    ctx.lineTo(x + width, y + height - radius);
    ctx.quadraticCurveTo(x + width, y + height, x + width - radius, y + height);
    ctx.lineTo(x + radius, y + height);
    ctx.quadraticCurveTo(x, y + height, x, y + height - radius);
    ctx.lineTo(x, y + radius);
    ctx.quadraticCurveTo(x, y, x + radius, y);
    ctx.closePath();
}
</script>

</body>
</html>
